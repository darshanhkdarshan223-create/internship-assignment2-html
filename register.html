<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4 mx-auto" style="max-width:500px">

<h3 class="text-center mb-4">Account Registration</h3>

<form>

<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter Full Name">

<label class="form-label mt-3">Email Address</label>
<input type="email" class="form-control" placeholder="Enter Email">

<label class="form-label mt-3">Mobile Number</label>
<input type="tel" class="form-control" placeholder="Enter Mobile Number">

<label class="form-label mt-3">Create Password</label>
<input type="password" class="form-control" placeholder="Create Password">

<label class="form-label mt-3">Confirm Password</label>
<input type="password" class="form-control" placeholder="Confirm Password">

<a href="login.html">
<button type="button" class="btn btn-success w-100 mt-4">
Create Account
</button>
</a>

</form>

<div class="text-center mt-3">
<a href="login.html">Already registered? Login</a>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
