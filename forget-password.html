<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width:400px">

<h3 class="text-center mb-4">Forgot Password</h3>

<form onsubmit="return sendResetLink()">

<label class="form-label">Enter your registered Email</label>

<input type="email" id="email" class="form-control" placeholder="Enter Email" required>

<button type="submit" class="btn btn-warning w-100 mt-4">
Send Reset Link
</button>

</form>

<p id="message" class="text-success text-center mt-3"></p>

<div class="text-center mt-2">
<a href="login.html">Back to Login</a>
</div>

</div>

</div>

<script>

function sendResetLink(){

var email = document.getElementById("email").value;

if(email === ""){
alert("Please enter your email");
return false;
}

document.getElementById("message").innerText =
"Reset link sent successfully! Redirecting...";

setTimeout(function(){
window.location.href = "reset-password.html";
},2000);

return false;

}

</script>

</body>
</html>
